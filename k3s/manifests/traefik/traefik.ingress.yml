apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: health.manosriram.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`health.manosriram.com`)
      kind: Rule
      middlewares:
        - name: tinyauth-forward
          namespace: default
      services:
        - name: gatus
          port: 9900
          namespace: default
  tls:
    certResolver: default
---
