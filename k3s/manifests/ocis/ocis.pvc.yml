apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ocis-config-pvc
  namespace: ocis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ocis-data-pvc
  namespace: ocis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
