apiVersion: v1
kind: Service
metadata:
  name: ocis
  namespace: ocis
spec:
  selector:
    app: ocis
  ports:
  - name: http
    port: 9200
    targetPort: 9200
---
apiVersion: v1
kind: Service
metadata:
  name: ocis-nodeport
  namespace: ocis
spec:
  type: NodePort
  selector:
    app: ocis
  ports:
  - name: http
    port: 9200
    targetPort: 9200
    nodePort: 30920
