apiVersion: apps/v1
kind: Deployment
metadata:
  name: glance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glance
  template:
    metadata:
      labels:
        app: glance
    spec:
      containers:
        - name: glance
          image: glanceapp/glance:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          env:
            - name: TAILSCALE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: glance-secret
                  key: TAILSCALE_API_KEY
                  optional: true
            - name: SYNCTHING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: glance-secret
                  key: SYNCTHING_API_KEY
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          hostPath:
            path: /fs/lab/data/glance
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: glance
spec:
  type: NodePort
  selector:
    app: glance
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30097
