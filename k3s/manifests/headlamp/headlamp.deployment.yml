apiVersion: v1
kind: Namespace
metadata:
  name: headlamp-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-admin
  namespace: headlamp-system
---
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: headlamp-admin-token
  namespace: headlamp-system
  annotations:
    kubernetes.io/service-account.name: headlamp-admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: headlamp-admin
    namespace: headlamp-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: headlamp
  namespace: headlamp-system
  labels:
    app: headlamp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: headlamp
  template:
    metadata:
      labels:
        app: headlamp
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      serviceAccountName: headlamp-admin
      initContainers:
        - name: generate-kubeconfig
          image: busybox
          command:
            - sh
            - -c
            - |
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CA=$(base64 -w 0 /var/run/secrets/kubernetes.io/serviceaccount/ca.crt)
              cat > /kubeconfig/config <<EOF
              apiVersion: v1
              kind: Config
              clusters:
              - name: local
                cluster:
                  server: https://kubernetes.default.svc:443
                  certificate-authority-data: ${CA}
              users:
              - name: headlamp-admin
                user:
                  token: ${TOKEN}
              contexts:
              - name: local
                context:
                  cluster: local
                  user: headlamp-admin
              current-context: local
              EOF
          volumeMounts:
            - name: token
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
            - name: kubeconfig
              mountPath: /kubeconfig
      containers:
        - name: headlamp
          image: ghcr.io/headlamp-k8s/headlamp:latest
          imagePullPolicy: IfNotPresent
          args:
            - "-kubeconfig=/kubeconfig/config"
            - "-plugins-dir=/headlamp/plugins"
          ports:
            - containerPort: 4466
              name: http
          volumeMounts:
            - name: kubeconfig
              mountPath: /kubeconfig
              readOnly: true
      volumes:
        - name: token
          secret:
            secretName: headlamp-admin-token
        - name: kubeconfig
          emptyDir: {}
